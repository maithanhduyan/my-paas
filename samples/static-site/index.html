<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My PaaS - Static Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 3rem;
      background: rgba(255,255,255,0.05);
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 600px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #7c6bf5; }
    p { font-size: 1.1rem; line-height: 1.8; color: #aaa; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      background: #7c6bf5;
      color: white;
      border-radius: 2rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello from My PaaS!</h1>
    <p>This is a static site deployed on <strong>My PaaS</strong>.<br>
       Edit the HTML files and redeploy to see changes.</p>
    <div class="badge">Static Site Sample</div>
  </div>
</body>
</html>
