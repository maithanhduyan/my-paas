<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Container/Server stack representing PaaS -->
  <!-- Top container -->
  <rect x="3" y="2" width="18" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="6" cy="4.5" r="1" fill="currentColor"/>
  <line x1="9" y1="4.5" x2="18" y2="4.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  <!-- Middle container -->
  <rect x="3" y="9" width="18" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="6" cy="11.5" r="1" fill="currentColor"/>
  <line x1="9" y1="11.5" x2="18" y2="11.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  <!-- Bottom container -->
  <rect x="3" y="16" width="18" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <circle cx="6" cy="18.5" r="1" fill="currentColor"/>
  <line x1="9" y1="18.5" x2="18" y2="18.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  <!-- Connection dots on right side -->
  <circle cx="20" cy="7" r="0.8" fill="currentColor"/>
  <line x1="20" y1="7" x2="20" y2="9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <circle cx="20" cy="14" r="0.8" fill="currentColor"/>
  <line x1="20" y1="14" x2="20" y2="16" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
