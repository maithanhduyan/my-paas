global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mypaas"
    static_configs:
      - targets: ["mypaas:8080"]
    metrics_path: /api/metrics
    scrape_interval: 10s

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
    scrape_interval: 30s
