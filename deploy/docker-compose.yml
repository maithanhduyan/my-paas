services:
  mypaas:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: mypaas-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mypaas-data:/data
    environment:
      - MYPAAS_DB=/data/mypaas.db
      - MYPAAS_LISTEN=:8080
      - MYPAAS_DOMAIN=${MYPAAS_DOMAIN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mypaas.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mypaas.entrypoints=web"
      - "traefik.http.routers.mypaas.priority=1"
      - "traefik.http.services.mypaas.loadbalancer.server.port=8080"
    networks:
      - mypaas-network

  traefik:
    image: traefik:v2.11
    container_name: mypaas-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOCKER_API_VERSION=1.45
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=mypaas-network
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --api.dashboard=false
      - --log.level=WARN
    networks:
      - mypaas-network

networks:
  mypaas-network:
    name: mypaas-network
    driver: bridge

volumes:
  mypaas-data:
  traefik-certs:
